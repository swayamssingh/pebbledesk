<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Material Desk Clock</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --panel-bg: rgba(25, 25, 25, 0.9);
            --panel-text: #ffffff;
            --panel-border: rgba(255, 255, 255, 0.1);
            
            --color-dark: #1062c3;
            --color-light: #5faaff;
            --color-dots: rgba(180, 205, 230, 0.75);
            --bar-bg: rgba(255, 255, 255, 0.04);
        }

        body.light-mode {
            --bg-color: #f5f5f7;
            --text-main: #1d1d1f;
            --panel-bg: rgba(255, 255, 255, 0.95);
            --panel-text: #1d1d1f;
            --panel-border: rgba(0, 0, 0, 0.1);
            --bar-bg: rgba(0, 0, 0, 0.03);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Fredoka', sans-serif;
            height: 100vh;
            display: flex;
            overflow: hidden;
            user-select: none;
            transition: background-color 0.3s ease;
        }

        /* --- SIDEBAR PANEL WITH TOGGLE --- */
        .sidebar {
            width: 300px;
            height: 100vh;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--panel-border);
            padding: 70px 20px 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 10;
            color: var(--panel-text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            transform: translateX(0);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar.closed {
            transform: translateX(-100%);
        }

        /* Menu Button */
        .menu-toggle {
            position: fixed;
            left: 15px;
            top: 15px;
            z-index: 11;
            background: rgba(128, 128, 128, 0.2);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            width: 45px;
            height: 45px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            transition: background 0.2s, left 0.3s;
        }
        .menu-toggle:hover {
            background: rgba(128, 128, 128, 0.4);
        }

        .sidebar h2 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.4rem;
            border-bottom: 2px solid var(--panel-border);
            padding-bottom: 8px;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .setting-label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            opacity: 0.8;
        }

        .btn-toggle, .btn-mode {
            background: rgba(128, 128, 128, 0.15);
            border: 1px solid var(--panel-border);
            color: inherit;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .btn-mode.active {
            background: var(--color-light);
            color: #000;
            border-color: transparent;
        }

        .color-presets {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .color-bubble {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .color-bubble.active {
            border-color: var(--panel-text);
            transform: scale(1.05);
        }

        .picker-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(128, 128, 128, 0.1);
            padding: 10px;
            border-radius: 12px;
        }

        .custom-picker {
            -webkit-appearance: none;
            appearance: none;
            width: 40px;
            height: 40px;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .custom-picker::-webkit-color-swatch {
            border-radius: 50%;
            border: 2px solid var(--panel-border);
        }

        .stopwatch-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-sw {
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            color: white;
        }
        .btn-start { background-color: #2ecc71; }
        .btn-reset { background-color: #e74c3c; }

        /* --- MAIN VIEWPORT LAYER --- */
        .main-display {
            flex: 1;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding-left: 0;
            transition: padding-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body:not(.sidebar-closed-state) .main-display {
            padding-left: 300px;
        }

        .view-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3.5vh;
        }

        .view-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .hidden {
            display: none !important;
        }

        /* --- FIXED CLEAN DIGITAL GRID --- */
        .display-group {
            display: flex;
            align-items: center;
        }

        .digit-pair {
            display: flex;
            align-items: center;
            font-size: 19vw; 
            font-weight: 700;
            line-height: 0.8;
        }

        .d1 {
            color: var(--color-dark);
            position: relative;
            z-index: 1;
        }

        .d2 {
            color: var(--color-light);
            margin-left: -0.15em; 
            position: relative;
            z-index: 2;
        }

        .colon-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4vw;
            margin: 0 1vw 0 -0.05em;
            z-index: 3;
        }

        .colon-dot {
            width: 2.8vw;
            height: 2.8vw;
            background-color: var(--color-dots);
            border-radius: 50%;
        }

        .ms-display {
            font-size: 8vw;
            color: var(--color-light);
            align-self: flex-end;
            margin-bottom: 0.5vw;
            margin-left: 2vw;
            opacity: 0.8;
            font-weight: 600;
        }

        /* --- COOL WORK TASKS BAR --- */
        .task-bar {
            width: 100%;
            max-width: 58vw;
            background: var(--bar-bg);
            border-left: 5px solid var(--color-light);
            border-top: 1px solid var(--panel-border);
            border-right: 1px solid var(--panel-border);
            border-bottom: 1px solid var(--panel-border);
            padding: 18px 25px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: border-color 0.3s ease;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--color-light);
        }

        .task-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.01em;
            line-height: 1.3;
        }

        /* Message Slot Checklist Sub-Grid */
        .task-checklist {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            margin-top: 6px;
            padding-top: 10px;
            border-top: 1px solid var(--panel-border);
        }

        .check-item {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
            opacity: 0.7;
        }
        
        .check-item::before {
            content: "✓";
            color: var(--color-light);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <!-- SIDEBAR SETTINGS -->
    <div class="sidebar" id="sidebarMenu">
        <h2>Options Panel</h2>
        
        <div class="setting-group">
            <span class="setting-label">Display Mode</span>
            <button class="btn-mode active" id="mode-clock" onclick="switchView('clock')">Clock</button>
            <button class="btn-mode" id="mode-sw" onclick="switchView('stopwatch')">Stopwatch</button>
        </div>

        <div class="setting-group">
            <span class="setting-label">Background Theme</span>
            <button class="btn-toggle" onclick="toggleTheme()">Toggle Light/Dark</button>
        </div>

        <div class="setting-group">
            <span class="setting-label">Theme Colors</span>
            <div class="color-presets">
                <div class="color-bubble active" style="background: #5faaff;" onclick="setThemeColor('#1062c3', '#5faaff', this)"></div>
                <div class="color-bubble" style="background: #2ecc71;" onclick="setThemeColor('#27ae60', '#2ecc71', this)"></div>
                <div class="color-bubble" style="background: #e74c3c;" onclick="setThemeColor('#c0392b', '#e74c3c', this)"></div>
                <div class="color-bubble" style="background: #e67e22;" onclick="setThemeColor('#d35400', '#e67e22', this)"></div>
                <div class="color-bubble" style="background: #9b59b6;" onclick="setThemeColor('#8e44ad', '#9b59b6', this)"></div>
            </div>
        </div>

        <div class="setting-group">
            <span class="setting-label">Custom Picker Map</span>
            <div class="picker-container">
                <input type="color" id="customColorInput" class="custom-picker" value="#5faaff" oninput="handleCustomColor(this.value)">
                <span>Choose Custom Color</span>
            </div>
        </div>

        <div class="setting-group" id="sw-controls-menu" style="display: none;">
            <span class="setting-label">Stopwatch Controls</span>
            <div class="stopwatch-controls">
                <button class="btn-sw btn-start" id="sw-toggle-btn" onclick="toggleStopwatch()">Start</button>
                <button class="btn-sw btn-reset" onclick="resetStopwatch()">Reset</button>
            </div>
        </div>
    </div>

    <!-- MAIN INTERACTIVE WRAPPER -->
    <div class="main-display">
        <div class="view-wrapper">
            
            <!-- Live Clock -->
            <div class="view-container" id="clock-interface">
                <div class="display-group">
                    <div class="digit-pair">
                        <span class="d1" id="h1">0</span>
                        <span class="d2" id="h2">0</span>
                    </div>
                    <div class="colon-container">
                        <div class="colon-dot"></div>
                        <div class="colon-dot"></div>
                    </div>
                    <div class="digit-pair">
                        <span class="d1" id="m1">0</span>
                        <span class="d2" id="m2">0</span>
                    </div>
                </div>
            </div>

            <!-- Stopwatch -->
            <div class="view-container hidden" id="stopwatch-interface">
                <div class="display-group">
                    <div class="digit-pair">
                        <span class="d1" id="s-m1">0</span>
                        <span class="d2" id="s-m2">0</span>
                    </div>
                    <div class="colon-container">
                        <div class="colon-dot"></div>
                        <div class="colon-dot"></div>
                    </div>
                    <div class="digit-pair">
                        <span class="d1" id="s-s1">0</span>
                        <span class="d2" id="s-s2">0</span>
                    </div>
                    <div class="ms-display" id="s-ms">00</div>
                </div>
            </div>

            <!-- DYNAMIC TASK BAR -->
            <div class="task-bar" id="schedule-bar">
                <div class="task-header">
                    <span id="task-status">Current Task</span>
                    <span id="task-time">00:00 - 00:00</span>
                </div>
                <div class="task-title" id="task-title">Loading Timetable...</div>
                <div class="task-checklist hidden" id="slot-checklist">
                    <div class="check-item">10 new cold messages</div>
                    <div class="check-item">Reply to responses</div>
                    <div class="check-item">Update CRM status</div>
                    <div class="check-item">Queue follow-ups</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- Hardcoded Timetable Data Matrix ---
        const timetable = [
            { start: "09:00", end: "09:15", name: "Set agenda & prepare CRM", isSlot: false },
            { start: "09:15", end: "09:27", name: "Message Slot 1: 10 cold messages + reply to responses + CRM updates", isSlot: true },
            { start: "09:27", end: "11:42", name: "Call Session 1 (25 calls)", isSlot: false },
            { start: "11:42", end: "11:54", name: "Message Slot 2: 10 cold messages + replies + CRM updates", isSlot: true },
            { start: "11:54", end: "13:00", name: "Continue Call Session 1 / Overflow", isSlot: false },
            { start: "13:00", end: "14:00", name: "Lunch Break ☕", isSlot: false },
            { start: "14:00", end: "14:12", name: "Message Slot 3: 10 cold messages + replies + CRM updates", isSlot: true },
            { start: "14:12", end: "16:00", name: "Call Session 2 (continue toward 25 calls)", isSlot: false },
            { start: "16:00", end: "16:12", name: "Message Slot 4: 10 cold messages + replies + CRM updates", isSlot: true },
            { start: "16:12", end: "20:00", name: "Meetings Block (Prep, Notes & Follow-ups)", isSlot: false },
            { start: "20:00", end: "21:48", name: "Upload 15 Blogs + Request Indexing", isSlot: false },
            { start: "21:48", end: "22:00", name: "Message Slot 5: Final 10 cold messages + replies + CRM updates + EOD review", isSlot: true }
        ];

        // --- Live Timetable Evaluator Engine ---
        function updateTaskBar(currentHour, currentMin) {
            const currentTotalMinutes = (currentHour * 60) + currentMin;
            let currentTask = null;

            for (let slot of timetable) {
                const [sHour, sMin] = slot.start.split(":").map(Number);
                const [eHour, eMin] = slot.end.split(":").map(Number);
                const startTotal = (sHour * 60) + sMin;
                const endTotal = (eHour * 60) + eMin;

                if (currentTotalMinutes >= startTotal && currentTotalMinutes < endTotal) {
                    currentTask = slot;
                    break;
                }
            }

            const titleEl = document.getElementById('task-title');
            const timeEl = document.getElementById('task-time');
            const checklistEl = document.getElementById('slot-checklist');
            const statusEl = document.getElementById('task-status');

            if (currentTask) {
                titleEl.textContent = currentTask.name;
                timeEl.textContent = `${format12Hour(currentTask.start)} - ${format12Hour(currentTask.end)}`;
                statusEl.textContent = currentTask.isSlot ? "⚡ Core Message Slot (12 Mins)" : "🎯 Current Focus";
                
                if (currentTask.isSlot) {
                    checklistEl.classList.remove('hidden');
                } else {
                    checklistEl.classList.add('hidden');
                }
            } else {
                titleEl.textContent = "Off-Duty / System Idle";
                timeEl.textContent = "Clear";
                statusEl.textContent = "Status";
                checklistEl.classList.add('hidden');
            }
        }

        function format12Hour(timeStr) {
            let [h, m] = timeStr.split(":").map(Number);
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12;
            h = h ? h : 12;
            return `${h}:${String(m).padStart(2, '0')} ${ampm}`;
        }

        // --- UI Panel Controls ---
        function toggleSidebar() {
            document.getElementById('sidebarMenu').classList.toggle('closed');
            document.body.classList.toggle('sidebar-closed-state');
        }

        let activeView = 'clock';
        function switchView(mode) {
            activeView = mode;
            document.getElementById('mode-clock').classList.toggle('active', mode === 'clock');
            document.getElementById('mode-sw').classList.toggle('active', mode === 'stopwatch');
            
            document.getElementById('clock-interface').classList.toggle('hidden', mode !== 'clock');
            document.getElementById('stopwatch-interface').classList.toggle('hidden', mode !== 'stopwatch');
            document.getElementById('sw-controls-menu').style.display = mode === 'stopwatch' ? 'flex' : 'none';
        }

        // --- Theme Tone Settings ---
        function setThemeColor(darkHex, lightHex, elementClicked) {
            document.documentElement.style.setProperty('--color-dark', darkHex);
            document.documentElement.style.setProperty('--color-light', lightHex);
            document.documentElement.style.setProperty('--color-dots', lightHex + 'bf'); 

            if(elementClicked) {
                document.querySelectorAll('.color-bubble').forEach(b => b.classList.remove('active'));
                elementClicked.classList.add('active');
            }
        }

        function handleCustomColor(hexValue) {
            document.querySelectorAll('.color-bubble').forEach(b => b.classList.remove('active'));
            const darkVariant = adjustColorBrightness(hexValue, -35);
            setThemeColor(darkVariant, hexValue, null);
        }

        function adjustColorBrightness(hex, percent) {
            let R = parseInt(hex.substring(1,3),16);
            let G = parseInt(hex.substring(3,5),16);
            let B = parseInt(hex.substring(5,7),16);
            R = parseInt(R * (100 + percent) / 100);
            G = parseInt(G * (100 + percent) / 100);
            B = parseInt(B * (100 + percent) / 100);
            R = (R<255)?R:255; G = (G<255)?G:255; B = (B<255)?B:255;
            R = (R>0)?R:0; G = (G>0)?G:0; B = (B>0)?B:0;
            let rHex = ((R.toString(16).length==1)?"0"+R.toString(16):R.toString(16));
            let gHex = ((G.toString(16).length==1)?"0"+G.toString(16):G.toString(16));
            let bHex = ((B.toString(16).length==1)?"0"+B.toString(16):B.toString(16));
            return "#"+rHex+gHex+bHex;
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        // --- Time Execution Engine ---
        function runClock() {
            const now = new Date();
            const rawHours = now.getHours();
            const rawMinutes = now.getMinutes();
            
            // Render Tasks Status Engine
            updateTaskBar(rawHours, rawMinutes);

            if(activeView !== 'clock') return;
            
            let hours = rawHours % 12;
            hours = hours ? hours : 12; 
            
            const hoursStr = String(hours).padStart(2, '0');
            const minutesStr = String(rawMinutes).padStart(2, '0');

            document.getElementById('h1').textContent = hoursStr[0];
            document.getElementById('h2').textContent = hoursStr[1];
            document.getElementById('m1').textContent = minutesStr[0];
            document.getElementById('m2').textContent = minutesStr[1];
        }
        setInterval(runClock, 1000);
        runClock();

        // --- Stopwatch System ---
        let swInterval = null;
        let startTime = 0;
        let elapsedTime = 0;
        let swRunning = false;

        function toggleStopwatch() {
            const btn = document.getElementById('sw-toggle-btn');
            if(!swRunning) {
                swRunning = true;
                btn.textContent = 'Pause';
                btn.style.backgroundColor = '#f1c40f';
                startTime = Date.now() - elapsedTime;
                swInterval = setInterval(updateStopwatch, 10);
            } else {
                swRunning = false;
                btn.textContent = 'Start';
                btn.style.backgroundColor = '#2ecc71';
                clearInterval(swInterval);
            }
        }

        function resetStopwatch() {
            swRunning = false;
            clearInterval(swInterval);
            elapsedTime = 0;
            const btn = document.getElementById('sw-toggle-btn');
            btn.textContent = 'Start';
            btn.style.backgroundColor = '#2ecc71';
            
            document.getElementById('s-m1').textContent = '0';
            document.getElementById('s-m2').textContent = '0';
            document.getElementById('s-s1').textContent = '0';
            document.getElementById('s-s2').textContent = '0';
            document.getElementById('s-ms').textContent = '00';
        }

        function updateStopwatch() {
            elapsedTime = Date.now() - startTime;
            
            let totalSeconds = Math.floor(elapsedTime / 1000);
            let mins = Math.floor(totalSeconds / 60);
            let secs = totalSeconds % 60;
            let ms = Math.floor((elapsedTime % 1000) / 10);

            const minStr = String(mins).padStart(2, '0');
            const secStr = String(secs).padStart(2, '0');
            const msStr = String(ms).padStart(2, '0');

            document.getElementById('s-m1').textContent = minStr[0];
            document.getElementById('s-m2').textContent = minStr[1];
            document.getElementById('s-s1').textContent = secStr[0];
            document.getElementById('s-s2').textContent = secStr[1];
            document.getElementById('s-ms').textContent = msStr;
        }
    </script>
</body>
</html>
